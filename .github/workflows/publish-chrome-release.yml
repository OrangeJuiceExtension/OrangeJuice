name: Publish Chrome Release

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-chrome-release
  cancel-in-progress: false

jobs:
  publish-chrome-release:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download Chrome release asset
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="$(gh release view --json tagName --jq '.tagName')"
          VERSION="${TAG#v}"
          ASSET_NAME="orangejuice-${VERSION}-chrome.zip"

          gh release download "${TAG}" \
            --pattern "${ASSET_NAME}" \
            --dir .

          echo "asset_name=${ASSET_NAME}" >> "$GITHUB_OUTPUT"

      - name: Publish to Chrome Web Store
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: bunx publish-extension --chrome-zip "${{ steps.release.outputs.asset_name }}"
